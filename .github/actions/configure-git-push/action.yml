name: Configure git push
description: Configure git identity and authenticated remote URL

inputs:
  github-token:
    description: GitHub token used for authenticated push
    required: true
  github-repository:
    description: Repository in owner/name format
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Configure Git and authenticated remote
      shell: bash
      env:
        INPUT_GITHUB_REPOSITORY: ${{ inputs.github-repository }}
      run: |
        repository="$INPUT_GITHUB_REPOSITORY"
        if [ -z "$repository" ]; then
          repository="$GITHUB_REPOSITORY"
        fi
        if [ -z "$repository" ]; then
          echo "Unable to detect repository. Pass 'github-repository' explicitly."
          exit 1
        fi

        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git remote set-url origin "https://x-access-token:${{ inputs.github-token }}@github.com/${repository}.git"
